<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>777 Tower | Los Angeles</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .hero.hidden { display: none; }
      .page { display: none; }
      .page.active { display: block; }
    </style>
</head>
<body>

<header class="fixed top-0 left-0 w-full bg-white/70 backdrop-blur-md z-50 border-b border-white/20">
  <div class="max-w-7xl mx-auto px-6 h-10 flex items-center justify-between">

    <div class="flex-shrink-0">
      <h1 class="text-2xl font-serif tracking-tighter text-black font-bold cursor-pointer select-none" data-home>777 TOWER</h1>
    </div>

    <!-- Desktop nav -->
    <nav class="hidden lg:flex space-x-8 h-full">
      <a href="javascript:void(0)" data-view="about" class="group relative flex items-center h-full text-xs font-bold uppercase tracking-widest text-gray-800 hover:text-black">
        <span class="absolute top-0 left-0 w-full h-1 bg-black scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></span>
        About
      </a>
      <a href="javascript:void(0)" data-view="details" class="group relative flex items-center h-full text-xs font-bold uppercase tracking-widest text-gray-800 hover:text-black">
        <span class="absolute top-0 left-0 w-full h-1 bg-black scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></span>
        Key Statistics
      </a>
      <a href="javascript:void(0)" data-view="contact" class="group relative flex items-center h-full text-xs font-bold uppercase tracking-widest text-gray-800 hover:text-black">
        <span class="absolute top-0 left-0 w-full h-1 bg-black scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></span>
        Contact
      </a>
    </nav>

    <div class="flex items-center gap-3">
      <!-- Mobile menu button -->
      <button type="button" class="lg:hidden flex items-center border border-gray-300 px-4 py-2 hover:bg-gray-50 transition-colors" aria-controls="mobile-menu" aria-expanded="false" data-mobile-menu-btn>
        <span class="text-sm font-medium text-gray-700">Menu</span>
        <svg class="ml-2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>

      <!-- CTA: opens Key Statistics for now -->
      <button type="button" data-view="details" class="hidden sm:flex items-center border border-gray-300 px-4 py-2 hover:bg-gray-50 transition-colors">
        <span class="bg-black p-1 mr-3">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </span>
        <span class="text-sm font-medium text-gray-700">Search Availabilities</span>
        <svg class="ml-2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M19 9l-7 7-7-7"></path>
        </svg>
      </button>
    </div>

  </div>

  <!-- Mobile menu panel -->
  <div id="mobile-menu" class="lg:hidden hidden border-t border-gray-100 bg-white">
    <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col gap-4">
      <a href="javascript:void(0)" data-view="about" class="text-xs font-bold uppercase tracking-widest text-gray-800 hover:text-black">About</a>
      <a href="javascript:void(0)" data-view="details" class="text-xs font-bold uppercase tracking-widest text-gray-800 hover:text-black">Key Statistics</a>
      <a href="javascript:void(0)" data-view="contact" class="text-xs font-bold uppercase tracking-widest text-gray-800 hover:text-black">Contact</a>
      <button type="button" data-view="details" class="flex items-center border border-gray-300 px-4 py-2 hover:bg-gray-50 transition-colors w-fit">
        <span class="bg-black p-1 mr-3">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </span>
        <span class="text-sm font-medium text-gray-700">Search Availabilities</span>
      </button>
    </div>
  </div>
</header>

    <section class="hero">
        <div class="slideshow" aria-hidden="true">
            <img src="image1.jpg" class="slide active" alt="">
            <img src="image2.jpg" class="slide" alt="">
            <img src="image3.jpg" class="slide" alt="">
        </div>

        <div class="hero-overlay" aria-hidden="true"></div>

        <div class="hero-content">
            <h1>777 TOWER</h1>
        </div>
    </section>

    <!-- Pages (shown when clicking nav buttons) -->
    <section class="view" aria-hidden="true">
        <div class="page" id="page-about" role="dialog" aria-modal="true" aria-label="About">
            <div class="page-header">
                <h2>About</h2>
                <button class="back-btn" type="button" data-back>Back</button>
            </div>
            <div class="container">
                <p>Add your About content here.</p>
            </div>
        </div>

        <div class="page" id="page-details" role="dialog" aria-modal="true" aria-label="Key Statistics">
            <div class="page-header">
                <h2>Key Statistics</h2>
                <button class="back-btn" type="button" data-back>Back</button>
            </div>
            <div class="stats-container">
                <p>Add your Key Statistics content here.</p>
            </div>
        </div>

        <div class="page" id="page-contact" role="dialog" aria-modal="true" aria-label="Contact">
            <div class="page-header">
                <h2>Contact</h2>
                <button class="back-btn" type="button" data-back>Back</button>
            </div>
            <div class="container">
                <p><strong>Name:</strong> Zhixin Shen</p>
                <p><strong>Phone:</strong> <a href="tel:16268221911">(626) 822-1911</a></p>
            </div>
        </div>
    </section>

    <footer class="py-2">
        <p>&copy; 2026 777 Tower. All rights reserved.</p>
    </footer>

    <script>
        // Slideshow
        const slides = document.querySelectorAll('.slide');
        let current = 0;

        if (slides.length > 0) {
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 4500);
        }

        // Overlay pages
        const hero = document.querySelector('.hero');
        const pages = {
            about: document.getElementById('page-about'),
            details: document.getElementById('page-details'),
            contact: document.getElementById('page-contact')
        };

        function showPage(key) {
            Object.values(pages).forEach(p => p?.classList.remove('active'));
            if (pages[key]) {
                pages[key].classList.add('active');
                hero?.classList.add('hidden');
            }
            closeMobileMenu();
        }

        function showHome() {
            Object.values(pages).forEach(p => p?.classList.remove('active'));
            hero?.classList.remove('hidden');
            closeMobileMenu();
        }

        document.querySelectorAll('[data-view]').forEach(el => {
            el.addEventListener('click', () => showPage(el.dataset.view));
        });

        document.querySelectorAll('[data-back]').forEach(btn => {
            btn.addEventListener('click', showHome);
        });

        document.querySelectorAll('[data-home]').forEach(el => {
            el.addEventListener('click', showHome);
        });

        // Mobile menu
        const mobileMenuBtn = document.querySelector('[data-mobile-menu-btn]');
        const mobileMenu = document.getElementById('mobile-menu');

        function openMobileMenu() {
            if (!mobileMenu) return;
            mobileMenu.classList.remove('hidden');
            mobileMenuBtn?.setAttribute('aria-expanded', 'true');
        }

        function closeMobileMenu() {
            if (!mobileMenu) return;
            mobileMenu.classList.add('hidden');
            mobileMenuBtn?.setAttribute('aria-expanded', 'false');
        }

        function toggleMobileMenu() {
            if (!mobileMenu) return;
            const isHidden = mobileMenu.classList.contains('hidden');
            if (isHidden) openMobileMenu();
            else closeMobileMenu();
        }

        mobileMenuBtn?.addEventListener('click', toggleMobileMenu);

        // ESC closes overlays + mobile menu
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeMobileMenu();
                showHome();
            }
        });
    </script>
</body>
</html>
