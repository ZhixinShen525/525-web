<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>777 Tower | Los Angeles</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .hero.hidden { display: none; }
      .page { display: none; }
      .page.active { display: block; }
      /* Mobile menu open/close animation */
      #mobile-menu {
        max-height: 0;
        opacity: 0;
        transform: translateY(-6px);
        overflow: hidden;
        pointer-events: none;
        transition: max-height 300ms ease, opacity 200ms ease, transform 300ms ease;
      }
      #mobile-menu.open {
        max-height: 360px;
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
    </style>
</head>
<body>

<header class="fixed top-0 left-0 w-full bg-white/70 backdrop-blur-md z-50 border-b border-white/20">
  <div class="max-w-7xl mx-auto px-4 h-10 flex items-center justify-between lg:grid lg:grid-cols-3 lg:items-center">

    <div class="flex-shrink-0">
      <h1 class="text-2xl font-serif tracking-tighter text-black font-bold cursor-pointer select-none whitespace-nowrap" data-home>777 TOWER</h1>
    </div>

    <!-- Desktop nav -->
    <nav class="hidden lg:flex space-x-8 h-full lg:justify-self-center">
      <a href="javascript:void(0)" data-view="about" class="group relative flex items-center h-full text-xs font-bold uppercase tracking-widest text-gray-800 hover:text-black">
        <span class="absolute top-0 left-0 w-full h-1 bg-black scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></span>
        About
      </a>
      <a href="javascript:void(0)" data-view="details" class="group relative flex items-center h-full text-xs font-bold uppercase tracking-widest text-gray-800 hover:text-black">
        <span class="absolute top-0 left-0 w-full h-1 bg-black scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></span>
        Address
      </a>
      <a href="javascript:void(0)" data-view="contact" class="group relative flex items-center h-full text-xs font-bold uppercase tracking-widest text-gray-800 hover:text-black">
        <span class="absolute top-0 left-0 w-full h-1 bg-black scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></span>
        Contact
      </a>
    </nav>

    <div class="flex items-center lg:justify-self-end">
      <!-- Mobile menu button -->
      <button type="button"
              class="lg:hidden text-xl font-semibold uppercase tracking-widest text-black flex items-center leading-none"
              aria-controls="mobile-menu"
              aria-expanded="false"
              data-mobile-menu-btn>
        <span>Menu</span>
        <span class="ml-2 text-xl font-semibold uppercase tracking-widest text-black leading-none" aria-hidden="true" data-menu-icon>▾</span>
      </button>
    </div>

  </div>

  <!-- Mobile menu panel -->
  <div id="mobile-menu" class="lg:hidden bg-transparent">
    <div class="w-1/2 ml-auto bg-white border-l border-b border-gray-100 px-6 py-4 flex flex-col gap-4">
      <a href="javascript:void(0)" data-view="about" class="text-xs font-bold uppercase tracking-widest text-gray-800 hover:text-black">About</a>
      <a href="javascript:void(0)" data-view="details" class="text-xs font-bold uppercase tracking-widest text-gray-800 hover:text-black">Address</a>
      <a href="javascript:void(0)" data-view="contact" class="text-xs font-bold uppercase tracking-widest text-gray-800 hover:text-black">Contact</a>
    </div>
  </div>
</header>

    <section class="hero">
        <div class="slideshow" aria-hidden="true">
            <img src="image1.jpg" class="slide active" alt="">
            <img src="image2.jpg" class="slide" alt="">
            <img src="image3.jpg" class="slide" alt="">
        </div>

        <div class="hero-overlay" aria-hidden="true"></div>

        <div class="hero-content">
            <h1>777 TOWER</h1>
        </div>
    </section>

    <!-- Pages (shown when clicking nav buttons) -->
    <section class="view" aria-hidden="true">
        <div class="page" id="page-about" role="dialog" aria-modal="true" aria-label="About">
            <div class="page-header">
                <h2>About</h2>
                <button class="back-btn" type="button" data-back>Back</button>
            </div>
            <div class="container">
                <p>Add your About content here.</p>
            </div>
        </div>

        <div class="page" id="page-details" role="dialog" aria-modal="true" aria-label="Address">
            <div class="page-header">
                <h2>Address</h2>
                <button class="back-btn" type="button" data-back>Back</button>
            </div>
            <div class="stats-container">
                <p class="text-lg font-semibold text-black mb-2"><strong>Address:</strong> 525 B St, San Diego, CA</p>

                <div class="mb-4">
                    <a
                        href="https://www.google.com/maps/dir/?api=1&destination=525+B+St+San+Diego+CA"
                        target="_blank"
                        class="text-sm font-medium underline text-black hover:opacity-70">
                        Get Directions
                    </a>
                </div>

                <div class="w-full lg:w-2/3 mx-auto overflow-hidden rounded-lg border border-gray-200">
                    <iframe
                        title="Google Map - 525 B St, San Diego, CA"
                        src="https://www.google.com/maps?q=525%20B%20St%2C%20San%20Diego%2C%20CA&output=embed"
                        width="100%"
                        height="450"
                        style="border:0;"
                        allowfullscreen=""
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </div>

        <div class="page" id="page-contact" role="dialog" aria-modal="true" aria-label="Contact">
            <div class="page-header">
                <h2>Contact</h2>
                <button class="back-btn" type="button" data-back>Back</button>
            </div>
            <div class="container">
                <p><strong>Name:</strong> Zhixin Shen</p>
                <p><strong>Phone:</strong> <a href="tel:16268221911">(626) 822-1911</a></p>
            </div>
        </div>
    </section>

    <footer class="py-2">
        <p>&copy; 2026 777 Tower. All rights reserved.</p>
    </footer>

    <script>
        // Slideshow
        const slides = document.querySelectorAll('.slide');
        let current = 0;

        if (slides.length > 0) {
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 4500);
        }

        // Overlay pages
        const hero = document.querySelector('.hero');
        const pages = {
            about: document.getElementById('page-about'),
            details: document.getElementById('page-details'),
            contact: document.getElementById('page-contact')
        };

        function showPage(key) {
            Object.values(pages).forEach(p => p?.classList.remove('active'));
            if (pages[key]) {
                pages[key].classList.add('active');
                hero?.classList.add('hidden');
            }
            closeMobileMenu();
        }

        function showHome() {
            Object.values(pages).forEach(p => p?.classList.remove('active'));
            hero?.classList.remove('hidden');
            closeMobileMenu();
        }

        document.querySelectorAll('[data-view]').forEach(el => {
            el.addEventListener('click', () => showPage(el.dataset.view));
        });

        document.querySelectorAll('[data-back]').forEach(btn => {
            btn.addEventListener('click', showHome);
        });

        document.querySelectorAll('[data-home]').forEach(el => {
            el.addEventListener('click', showHome);
        });

        // Mobile menu
        const mobileMenuBtn = document.querySelector('[data-mobile-menu-btn]');
        const menuIcon = document.querySelector('[data-menu-icon]');
        const mobileMenu = document.getElementById('mobile-menu');

        function openMobileMenu() {
            if (!mobileMenu) return;
            mobileMenu.classList.add('open');
            mobileMenuBtn?.setAttribute('aria-expanded', 'true');
            if (menuIcon) menuIcon.textContent = '×';
        }

        function closeMobileMenu() {
            if (!mobileMenu) return;
            mobileMenu.classList.remove('open');
            mobileMenuBtn?.setAttribute('aria-expanded', 'false');
            if (menuIcon) menuIcon.textContent = '▾';
        }

        function toggleMobileMenu() {
            if (!mobileMenu) return;
            const isOpen = mobileMenu.classList.contains('open');
            if (!isOpen) openMobileMenu();
            else closeMobileMenu();
        }

        mobileMenuBtn?.addEventListener('click', toggleMobileMenu);

        // ESC closes overlays + mobile menu
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeMobileMenu();
                showHome();
            }
        });
    </script>
</body>
</html>
