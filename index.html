<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>777 Tower | Los Angeles</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<header class="fixed top-0 left-0 w-full bg-white z-50 border-b border-gray-100">
  <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
    
    <div class="flex-shrink-0">
      <h1 class="text-3xl font-serif tracking-tighter text-[#004A44] font-bold">RUDIN</h1>
    </div>

    <nav class="hidden lg:flex space-x-8 h-full">
      <a href="#" class="group relative flex items-center h-full text-xs font-bold uppercase tracking-widest text-gray-800 hover:text-black">
        <span class="absolute top-0 left-0 w-full h-1 bg-[#004A44] scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></span>
        Office Properties
      </a>
      <a href="#" class="group relative flex items-center h-full text-xs font-bold uppercase tracking-widest text-gray-800 hover:text-black">
        <span class="absolute top-0 left-0 w-full h-1 bg-[#004A44] scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></span>
        Residential Properties
      </a>
      <a href="#" class="group relative flex items-center h-full text-xs font-bold uppercase tracking-widest text-gray-800 hover:text-black">
        Recent Projects
      </a>
    </nav>

    <div class="flex items-center">
      <button class="flex items-center border border-gray-300 px-4 py-2 hover:bg-gray-50 transition-colors">
        <span class="bg-[#004A44] p-1 mr-3">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </span>
        <span class="text-sm font-medium text-gray-700">Search Availabilities</span>
        <svg class="ml-2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M19 9l-7 7-7-7"></path>
        </svg>
      </button>
    </div>

  </div>
</header>

    <section class="hero">
        <div class="slideshow" aria-hidden="true">
            <img src="image1.jpg" class="slide active" alt="">
            <img src="image2.jpg" class="slide" alt="">
            <img src="image3.jpg" class="slide" alt="">
        </div>

        <div class="hero-overlay" aria-hidden="true"></div>

        <div class="hero-content">
            <h1>777 TOWER</h1>
        </div>
    </section>

    <!-- Pages (shown when clicking nav buttons) -->
    <section class="view" aria-hidden="true">
        <div class="page" id="page-about" role="dialog" aria-modal="true" aria-label="About">
            <div class="page-header">
                <h2>About</h2>
                <button class="back-btn" type="button" data-back>Back</button>
            </div>
            <div class="container">
                <p>Add your About content here.</p>
            </div>
        </div>

        <div class="page" id="page-details" role="dialog" aria-modal="true" aria-label="Key Statistics">
            <div class="page-header">
                <h2>Key Statistics</h2>
                <button class="back-btn" type="button" data-back>Back</button>
            </div>
            <div class="stats-container">
                <p>Add your Key Statistics content here.</p>
            </div>
        </div>

        <div class="page" id="page-contact" role="dialog" aria-modal="true" aria-label="Contact">
            <div class="page-header">
                <h2>Contact</h2>
                <button class="back-btn" type="button" data-back>Back</button>
            </div>
            <div class="container">
                <p><strong>Name:</strong> Zhixin Shen</p>
                <p><strong>Phone:</strong> <a href="tel:16268221911">(626) 822-1911</a></p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 777 Tower. All rights reserved.</p>
    </footer>

    <script>
        // Slideshow
        const slides = document.querySelectorAll('.slide');
        let current = 0;

        if (slides.length > 0) {
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 4500);
        }

        // Menu overlay
        const menu = document.getElementById('site-menu');
        const menuBtn = document.querySelector('.menu-btn');
        const menuClose = document.querySelector('.menu-close');

        function openMenu() {
            menu.classList.add('open');
            menu.setAttribute('aria-hidden', 'false');
            menuBtn.setAttribute('aria-expanded', 'true');
            document.body.classList.add('menu-open');
        }

        function closeMenu() {
            menu.classList.remove('open');
            menu.setAttribute('aria-hidden', 'true');
            menuBtn.setAttribute('aria-expanded', 'false');
            document.body.classList.remove('menu-open');
        }

        menuBtn?.addEventListener('click', () => {
            if (menu.classList.contains('open')) closeMenu();
            else openMenu();
        });

        menuClose?.addEventListener('click', closeMenu);

        // Page navigation
        const hero = document.querySelector('.hero');
        const pages = {
            about: document.getElementById('page-about'),
            details: document.getElementById('page-details'),
            contact: document.getElementById('page-contact')
        };

        function showPage(key) {
            Object.values(pages).forEach(p => p.classList.remove('active'));
            if (pages[key]) {
                pages[key].classList.add('active');
                hero.classList.add('hidden');
                closeMenu();
            }
        }

        function showHome() {
            Object.values(pages).forEach(p => p.classList.remove('active'));
            hero.classList.remove('hidden');
            closeMenu();
        }

        document.querySelectorAll('[data-view]').forEach(link => {
            link.addEventListener('click', () => showPage(link.dataset.view));
        });

        document.querySelectorAll('[data-back]').forEach(btn => {
            btn.addEventListener('click', showHome);
        });

        document.querySelectorAll('[data-home]').forEach(el => {
            el.style.cursor = 'pointer';
            el.addEventListener('click', showHome);
        });

        // Close menu on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && menu.classList.contains('open')) closeMenu();
        });
    </script>
</body>
</html>
